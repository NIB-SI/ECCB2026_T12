<svg viewBox="0 0 800 295" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, sans-serif">
  <title>Orthologs, Paralogs, Homeologs, Xenologs</title>

  <rect width="800" height="295" fill="#f8f9f7" rx="6"/>

  <!-- Legend -->
  <circle cx="22" cy="18" r="6" fill="#2563eb"/>
  <text x="32" y="22" font-size="10" fill="#2563eb">Speciation</text>
  <rect x="98" y="12" width="12" height="12" fill="#dc2626" rx="2"/>
  <text x="114" y="22" font-size="10" fill="#dc2626">Duplication</text>
  <polygon points="186,12 192,24 180,24" fill="#7c3aed"/>
  <text x="197" y="22" font-size="10" fill="#7c3aed">Polyploidization</text>
  <line x1="278" y1="18" x2="294" y2="18" stroke="#b45309" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="294,14 301,18 294,22" fill="#b45309"/>
  <text x="306" y="22" font-size="10" fill="#b45309">Horizontal transfer</text>

  <!-- Dividers -->
  <line x1="192" y1="32" x2="192" y2="295" stroke="#d0d9ce" stroke-width="1"/>
  <line x1="398" y1="32" x2="398" y2="295" stroke="#d0d9ce" stroke-width="1"/>
  <line x1="600" y1="32" x2="600" y2="295" stroke="#d0d9ce" stroke-width="1"/>

  <!-- ===== 1. ORTHOLOGS ===== -->
  <text x="96" y="48" text-anchor="middle" font-size="12" font-weight="bold" fill="#234d35">Orthologs</text>
  <text x="96" y="62" text-anchor="middle" font-size="9.5" fill="#5d8a6c">speciation → same gene, diff. species</text>

  <line x1="96" y1="135" x2="96" y2="90" stroke="#5d8a6c" stroke-width="1.5"/>
  <circle cx="96" cy="90" r="6" fill="#2563eb"/>
  <line x1="96" y1="90" x2="55" y2="140" stroke="#5d8a6c" stroke-width="1.5"/>
  <line x1="96" y1="90" x2="137" y2="140" stroke="#5d8a6c" stroke-width="1.5"/>

  <rect x="39" y="140" width="32" height="18" rx="4" fill="#bbf7d0" stroke="#234d35" stroke-width="1.2"/>
  <text x="55" y="153" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">geneA</text>
  <text x="55" y="168" text-anchor="middle" font-size="8.5" fill="#5d8a6c">Sp. A</text>

  <rect x="121" y="140" width="32" height="18" rx="4" fill="#bbf7d0" stroke="#234d35" stroke-width="1.2"/>
  <text x="137" y="153" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">geneB</text>
  <text x="137" y="168" text-anchor="middle" font-size="8.5" fill="#5d8a6c">Sp. B</text>

  <line x1="71" y1="149" x2="117" y2="149" stroke="#234d35" stroke-width="1.5"/>
  <polygon points="117,145 125,149 117,153" fill="#234d35"/>
  <polygon points="71,145 63,149 71,153" fill="#234d35"/>
  <text x="94" y="143" text-anchor="middle" font-size="8.5" fill="#234d35" font-weight="bold">ortholog</text>

  <text x="96" y="195" text-anchor="middle" font-size="9" fill="#234d35">→ functional equivalents</text>
  <text x="96" y="208" text-anchor="middle" font-size="9" fill="#234d35">across species</text>

  <!-- ===== 2. PARALOGS ===== -->
  <text x="295" y="48" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">Paralogs</text>
  <text x="295" y="62" text-anchor="middle" font-size="9.5" fill="#ef4444">duplication → copies within/between sp.</text>

  <line x1="295" y1="135" x2="295" y2="90" stroke="#fca5a5" stroke-width="1.5"/>
  <rect x="288" y="83" width="14" height="14" fill="#dc2626" rx="2"/>

  <line x1="295" y1="90" x2="248" y2="128" stroke="#fca5a5" stroke-width="1.5"/>
  <line x1="295" y1="90" x2="342" y2="128" stroke="#fca5a5" stroke-width="1.5"/>

  <circle cx="248" cy="128" r="5" fill="#2563eb"/>
  <line x1="248" y1="128" x2="222" y2="165" stroke="#fca5a5" stroke-width="1.5"/>
  <line x1="248" y1="128" x2="274" y2="165" stroke="#fca5a5" stroke-width="1.5"/>

  <circle cx="342" cy="128" r="5" fill="#2563eb"/>
  <line x1="342" y1="128" x2="316" y2="165" stroke="#fca5a5" stroke-width="1.5"/>
  <line x1="342" y1="128" x2="368" y2="165" stroke="#fca5a5" stroke-width="1.5"/>

  <rect x="207" y="165" width="28" height="16" rx="3" fill="#fecaca" stroke="#dc2626" stroke-width="1.2"/>
  <text x="221" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">A1</text>
  <text x="221" y="192" text-anchor="middle" font-size="8" fill="#ef4444">Sp.A</text>

  <rect x="259" y="165" width="28" height="16" rx="3" fill="#fecaca" stroke="#dc2626" stroke-width="1.2"/>
  <text x="273" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">B1</text>
  <text x="273" y="192" text-anchor="middle" font-size="8" fill="#ef4444">Sp.B</text>

  <rect x="302" y="165" width="28" height="16" rx="3" fill="#fecaca" stroke="#dc2626" stroke-width="1.2"/>
  <text x="316" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">A2</text>
  <text x="316" y="192" text-anchor="middle" font-size="8" fill="#ef4444">Sp.A</text>

  <rect x="354" y="165" width="28" height="16" rx="3" fill="#fecaca" stroke="#dc2626" stroke-width="1.2"/>
  <text x="368" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">B2</text>
  <text x="368" y="192" text-anchor="middle" font-size="8" fill="#ef4444">Sp.B</text>

  <path d="M235,181 Q247,205 302,181" fill="none" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="268" y="220" text-anchor="middle" font-size="8.5" fill="#dc2626" font-weight="bold">within-sp. paralog</text>

  <path d="M235,174 Q295,152 354,174" fill="none" stroke="#f97316" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="295" y="148" text-anchor="middle" font-size="8.5" fill="#f97316" font-weight="bold">between-sp. paralog</text>

  <!-- ===== 3. HOMEOLOGS ===== -->
  <text x="499" y="48" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6">Homeologs</text>
  <text x="499" y="62" text-anchor="middle" font-size="9.5" fill="#7c3aed">polyploidization → merged subgenomes</text>

  <line x1="469" y1="102" x2="450" y2="128" stroke="#c4b5fd" stroke-width="1.5"/>
  <line x1="529" y1="102" x2="548" y2="128" stroke="#c4b5fd" stroke-width="1.5"/>

  <rect x="430" y="128" width="40" height="16" rx="3" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="450" y="140" text-anchor="middle" font-size="8.5" fill="#5b21b6">Genome A</text>

  <rect x="528" y="128" width="40" height="16" rx="3" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="548" y="140" text-anchor="middle" font-size="8.5" fill="#5b21b6">Genome B</text>

  <line x1="450" y1="144" x2="499" y2="162" stroke="#c4b5fd" stroke-width="1.5"/>
  <line x1="548" y1="144" x2="499" y2="162" stroke="#c4b5fd" stroke-width="1.5"/>
  <polygon points="499,158 505,172 493,172" fill="#7c3aed"/>

  <line x1="499" y1="172" x2="499" y2="188" stroke="#c4b5fd" stroke-width="1.5"/>
  <rect x="453" y="188" width="92" height="16" rx="3" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="499" y="200" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#4c1d95">Polyploid species</text>

  <line x1="478" y1="204" x2="465" y2="228" stroke="#c4b5fd" stroke-width="1.5"/>
  <line x1="520" y1="204" x2="533" y2="228" stroke="#c4b5fd" stroke-width="1.5"/>

  <rect x="446" y="228" width="36" height="16" rx="3" fill="#c4b5fd" stroke="#5b21b6" stroke-width="1.2"/>
  <text x="464" y="240" text-anchor="middle" font-size="9" font-weight="bold" fill="#4c1d95">geneA</text>
  <text x="464" y="255" text-anchor="middle" font-size="8" fill="#7c3aed">subgn. A</text>

  <rect x="516" y="228" width="36" height="16" rx="3" fill="#c4b5fd" stroke="#5b21b6" stroke-width="1.2"/>
  <text x="534" y="240" text-anchor="middle" font-size="9" font-weight="bold" fill="#4c1d95">geneB</text>
  <text x="534" y="255" text-anchor="middle" font-size="8" fill="#7c3aed">subgn. B</text>

  <line x1="482" y1="236" x2="512" y2="236" stroke="#7c3aed" stroke-width="1.5"/>
  <polygon points="512,232 520,236 512,240" fill="#7c3aed"/>
  <polygon points="482,232 474,236 482,240" fill="#7c3aed"/>
  <text x="498" y="230" text-anchor="middle" font-size="8.5" fill="#7c3aed" font-weight="bold">homeolog</text>

  <!-- ===== 4. XENOLOGS ===== -->
  <text x="700" y="48" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Xenologs</text>
  <text x="700" y="62" text-anchor="middle" font-size="9.5" fill="#b45309">HGT → cross-species transfer</text>

  <line x1="660" y1="130" x2="660" y2="95" stroke="#fde68a" stroke-width="1.5"/>
  <circle cx="660" cy="95" r="5" fill="#2563eb"/>
  <line x1="660" y1="95" x2="638" y2="138" stroke="#fde68a" stroke-width="1.5"/>
  <line x1="660" y1="95" x2="682" y2="138" stroke="#fde68a" stroke-width="1.5"/>

  <rect x="622" y="138" width="32" height="16" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="1.2"/>
  <text x="638" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e">donor</text>
  <text x="638" y="165" text-anchor="middle" font-size="8" fill="#b45309">Sp. A</text>

  <rect x="666" y="138" width="32" height="16" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="1.2"/>
  <text x="682" y="150" text-anchor="middle" font-size="9" fill="#92400e">gene</text>
  <text x="682" y="165" text-anchor="middle" font-size="8" fill="#b45309">Sp. A</text>

  <line x1="750" y1="130" x2="750" y2="95" stroke="#a7f3d0" stroke-width="1.5"/>
  <circle cx="750" cy="95" r="5" fill="#2563eb"/>
  <line x1="750" y1="95" x2="728" y2="138" stroke="#a7f3d0" stroke-width="1.5"/>
  <line x1="750" y1="95" x2="772" y2="138" stroke="#a7f3d0" stroke-width="1.5"/>

  <rect x="712" y="138" width="32" height="16" rx="3" fill="#d1fae5" stroke="#065f46" stroke-width="1.2"/>
  <text x="728" y="150" text-anchor="middle" font-size="9" fill="#065f46">geneY</text>
  <text x="728" y="165" text-anchor="middle" font-size="8" fill="#065f46">Sp. B</text>

  <rect x="756" y="138" width="32" height="16" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="772" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e">xeno</text>
  <text x="772" y="165" text-anchor="middle" font-size="8" fill="#b45309">Sp. B</text>

  <path d="M654,146 Q710,200 756,146" fill="none" stroke="#b45309" stroke-width="1.8" stroke-dasharray="5,3"/>
  <polygon points="753,142 762,146 753,150" fill="#b45309"/>
  <text x="706" y="212" text-anchor="middle" font-size="9" fill="#b45309" font-weight="bold">HGT</text>

  <line x1="670" y1="146" x2="752" y2="146" stroke="#b45309" stroke-width="1.2"/>
  <polygon points="752,142 760,146 752,150" fill="#b45309"/>
  <polygon points="670,142 662,146 670,150" fill="#b45309"/>
  <text x="711" y="140" text-anchor="middle" font-size="8.5" fill="#b45309" font-weight="bold">xenolog</text>
</svg>
